name: Benchmark

# Manual only: benchmark numbers are machine-specific, so they are produced by
# dispatching this workflow (which runs on dedicated amd64 and arm64 runners),
# not on every push.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Run both benchmark suites on each architecture; the rendered summaries are
  # per-GOARCH (results_<arch>.md, pkg_results_<arch>.md). Each job uploads only
  # its own files so the architectures never race; the commit job collects both.
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run benchmarks
        env:
          GOTOOLCHAIN: auto
        run: make bench-md
      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.arch }}
          path: |
            bench/results_${{ matrix.arch }}.md
            bench/pkg_results_${{ matrix.arch }}.md

  # Collect both architectures' results and commit them in one push. [skip ci]
  # keeps the results commit from re-triggering the push-driven CI workflow.
  commit:
    needs: bench
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
      - name: Download results
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Commit results
        run: |
          set -euo pipefail
          for f in results_amd64.md results_arm64.md pkg_results_amd64.md pkg_results_arm64.md; do
            find artifacts -name "$f" -exec cp {} bench/ \;
          done
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          files="bench/results_amd64.md bench/results_arm64.md bench/pkg_results_amd64.md bench/pkg_results_arm64.md"
          if git diff --quiet -- $files; then
            echo "Benchmark results unchanged; nothing to commit."
            exit 0
          fi
          git add $files
          git commit -m "Update benchmark results [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
